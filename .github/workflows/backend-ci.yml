name: Backend CI

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medcare
          POSTGRES_PASSWORD: medcare_test
          POSTGRES_DB: medcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medcare"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://medcare:medcare_test@localhost:5432/medcare_test
      JWT_SECRET: ci-test-secret-key
      JWT_REFRESH_SECRET: ci-test-refresh-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --ext .ts || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test || true

      - name: Build
        run: npm run build

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: Add staging deployment steps (e.g., SSH, Docker push, or cloud deploy)
      - name: Deploy to staging
        run: echo "Deploying to staging environment..."

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: Add production deployment steps
      - name: Deploy to production
        run: echo "Deploying to production environment..."
