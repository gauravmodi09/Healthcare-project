name: iOS CI

on:
  push:
    branches: [develop, main]
    paths:
      - "MedCare/**"
      - "MedCare.xcodeproj/**"
      - "MedCareWidgetExtension/**"
      - "Shared/**"
  pull_request:
    branches: [develop, main]
    paths:
      - "MedCare/**"
      - "MedCare.xcodeproj/**"

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project MedCare.xcodeproj \
            -scheme MedCare \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run tests
        run: |
          xcodebuild test \
            -project MedCare.xcodeproj \
            -scheme MedCare \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

  upload-testflight:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      # TODO: Add archive + upload steps
