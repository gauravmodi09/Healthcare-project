name: MedCare
options:
  bundleIdPrefix: com.medcare
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: MedCare/Resources/Info.plist

targets:
  MedCare:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedCare
        excludes:
          - "**/*.xcassets"
          - "Resources/Info.plist"
    resources:
      - path: MedCare/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcare.app
        INFOPLIST_FILE: MedCare/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: MedCare/Resources/MedCare.entitlements
      properties:
        aps-environment: development

  MedCareTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedCareTests
    dependencies:
      - target: MedCare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcare.app.tests

schemes:
  MedCare:
    build:
      targets:
        MedCare: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MedCareTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
