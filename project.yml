name: MedCare
options:
  bundleIdPrefix: com.medcare
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: MedCare/Resources/Info.plist

targets:
  MedCare:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedCare
        excludes:
          - "**/*.xcassets"
          - "Resources/Info.plist"
      - path: Shared
    resources:
      - path: MedCare/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcare.app
        INFOPLIST_FILE: MedCare/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_EMIT_LOC_STRINGS: true
    entitlements:
      path: MedCare/Resources/MedCare.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.medcare.shared
    dependencies:
      - target: MedCareWidgetExtension
        embed: true

  MedCareWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedCareWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcare.app.widgets
        INFOPLIST_FILE: MedCareWidgetExtension/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: true
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: MedCareWidgetExtension/MedCareWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.medcare.shared

  MedCareTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MedCareTests
    dependencies:
      - target: MedCare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medcare.app.tests

schemes:
  MedCare:
    build:
      targets:
        MedCare: all
        MedCareWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MedCareTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
